name: CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build with Maven
        run: ./mvnw package -DskipTests
      
      - name: Build and push Docker image
        run: |
          docker login --username ppattana-iu --password ${{secrets.ACCESS_TOKEN}} ghcr.io
          docker build -t ghcr.io/ppattana-iu/ducks-service:latest --file Dockerfile .
          docker push ghcr.io/ppattana-iu/ducks-service:latest
