<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
        .card {
            box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.2);
            transition: 0.3s;
            width: 20%;
            border-radius: 5px;
        }
        .card:hover {
            box-shadow: 0 8px 16px 0 rgba(0, 0, 0, 0.2);
        }
        img {
            border-radius: 5px 5px 0 0;
        }
        .container {
            padding: 2px 16px;
        }
    </style>
</head>
<body>
<div id="pond"></div>

<script>
    async function loadDucks() {
        let host = "https://ducks-service-ppattana-iu.onrender.com";
        let response = await fetch(host + "/ducks");
        let ducks = await response.json();
        let pond = document.getElementById("pond");

        for (let duck of ducks) {
            let card = document.createElement("div");
            card.className = "card";

            let img = document.createElement("img");
            img.src = host + "/ducks/" + duck.id + "/image";
            img.alt = "Duck";
            img.style.width = "100%";

            let container = document.createElement("div");
            container.className = "container";

            let h4 = document.createElement("h4");
            h4.innerHTML = "<b>" + duck.id + "</b>";

            let p = document.createElement("p");
            p.textContent = duck.type;

            container.appendChild(h4);
            container.appendChild(p);
            card.appendChild(img);
            card.appendChild(container);
            pond.appendChild(card);
        }
    }

    loadDucks();
</script>
</body>
</html>
